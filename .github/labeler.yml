ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**/*
          - codecov.yml
          - .coderabbit.yml
          - lefthook.yml

config:
  - changed-files:
      - any-glob-to-any-file:
          - package.json
          - pnpm-lock.yaml
          - pnpm-workspace.yaml
          - turbo.json
          - tsconfig.base.json
          - biome.json
          - renovate.json
          - .gitignore
          - .npmrc

tui:
  - changed-files:
      - any-glob-to-any-file:
          - apps/tui/**/*

vscode:
  - changed-files:
      - any-glob-to-any-file:
          - apps/vscode/**/*

shared:
  - changed-files:
      - any-glob-to-any-file:
          - packages/shared/**/*

workspace:
  - changed-files:
      - any-glob-to-any-file:
          - apps/**/*
          - packages/**/*
          - .changeset/**/*

test:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.test.ts"
          - "**/*.test.tsx"
