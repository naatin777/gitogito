name: VSCode Extension Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  vscode:
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck VSCode package
        run: pnpm --filter @gitogito/vscode check

      - name: Build VSCode package
        run: pnpm --filter @gitogito/vscode build

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run VSCode tests
        run: xvfb-run -a pnpm --filter @gitogito/vscode test

      - name: Run VSCode coverage
        run: xvfb-run -a pnpm --filter @gitogito/vscode test:coverage

      - name: Upload VSCode coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./apps/vscode/.coverage/lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
