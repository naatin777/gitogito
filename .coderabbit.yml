# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true

  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "Draft"
      - "DO NOT MERGE"

  path_filters:
    - "!bun.lock"
    - "!**/*.lock"
    - "!**/out/**"
    - "!**/dist/**"
    - "!**/cov_profile/**"

  path_instructions:
    - path: "apps/tui/**"
      instructions: |
        You are a Senior Bun + TypeScript Software Engineer.
        - Review the code based on Bun runtime best practices.
        - Ensure OpenTUI usage (@opentui/react) and Cliffy command wiring are correct.
        - Focus on CLI-specific behavior (stdin/stdout, terminal handling).
    - path: "apps/vscode/**"
      instructions: |
        You are a Senior VS Code Extension Developer.
        - Review the code based on VS Code API best practices.
        - Ensure proper use of `vscode.ExtensionContext`, disposables, and command registrations.
        - Be mindful of Node.js (CommonJS/ESM) compatibility within the VS Code environment.
    - path: "**"
      instructions: |
        Review the code for logic errors, security risks, and performance.
        - Enforce strict TypeScript typing (avoid `any`).
        - Do not comment on formatting (assume Biome handles it).
        - Keep feedback concise, constructive, and "chill".

chat:
  auto_reply: true
