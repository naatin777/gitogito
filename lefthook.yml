# https://lefthook.dev/configuration/
# Lefthook はローカルのみ。--no-verify や hooks 未導入を防ぐには GitHub Actions のままがよい。
pre-commit:
  commands:
    biome:
      glob:
        - "src/**/*.ts"
        - "src/**/*.tsx"
      stage_fixed: true
      run: biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    check:
      run: bun check
