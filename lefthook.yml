pre-commit:
  commands:
    syncpack:
      run: pnpm syncpack lint --dependency-types prod,dev

    biome:
      glob: "*.{ts,tsx,js,jsx,json,cjs,mjs}"
      stage_fixed: true
      run: pnpm exec biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}

    check:
      run: pnpm turbo run check

    gitleaks:
      run: gitleaks protect --staged --verbose
